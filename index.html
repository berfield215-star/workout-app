<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="筋トレメモ">
<meta name="theme-color" content="#639922">
<title>筋トレメモ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;-webkit-tap-highlight-color:transparent;}
:root{
  --g50:#EAF3DE;--g200:#97C459;--g400:#639922;--g600:#3B6D11;
  --sp50:#FFF8E1;--sp400:#F59E0B;--sp600:#B45309;
  --mint:#f0faf5;
  --bg:#ffffff;--bg2:#f7f9f7;
  --txt:#1a1a1a;--txt2:#666666;
  --bd:rgba(0,0,0,0.12);--red:#c0392b;
}
html,body{height:100%;background:#f0f0f0;}
.app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
.header{background:#fff;border-bottom:0.5px solid var(--bd);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.mnav{display:flex;align-items:center;gap:10px;}
.nb{background:none;border:0.5px solid var(--bd);border-radius:6px;width:32px;height:32px;cursor:pointer;font-size:16px;color:var(--txt2);display:flex;align-items:center;justify-content:center;}
.nb:active{background:var(--bg2);}
.content{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
.tabs{display:flex;border-bottom:0.5px solid var(--bd);background:#fff;position:sticky;top:53px;z-index:9;}
.tab{flex:1;padding:10px 2px;font-size:11px;text-align:center;cursor:pointer;color:var(--txt2);border-bottom:2px solid transparent;user-select:none;}
.tab.active{color:var(--g600);border-bottom-color:var(--g400);font-weight:600;}
.cgrid{padding:10px 10px 0;}
.dlabels{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.dl{text-align:center;font-size:11px;color:var(--txt2);padding:3px 0;}
.cdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dc{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;cursor:pointer;position:relative;color:var(--txt);user-select:none;}
.dc:active{background:var(--g50);}
.dc.other{color:var(--bd);pointer-events:none;}
.dc.today{background:var(--g200);color:#fff;font-weight:600;}
.dc.dot::after{content:'';position:absolute;bottom:3px;width:5px;height:5px;border-radius:50%;background:var(--g400);}
.dc.today.dot::after{background:#fff;}
/* goal achieved: achieved1=1系統丸, achieved2=2系統花丸 */
.dc.achieved1{box-shadow:0 0 0 2.5px var(--g400);font-weight:600;}
.dc.today.achieved1{box-shadow:0 0 0 2.5px #fff;}
.dc.achieved2{box-shadow:0 0 0 2.5px var(--g400);font-weight:600;}
.dc.achieved2::before{content:'💮';position:absolute;top:-6px;right:-6px;font-size:12px;line-height:1;}
.dc.today.achieved2{box-shadow:0 0 0 2.5px #fff;}
.dc.achieved1.dot::after,.dc.achieved2.dot::after{background:var(--g600);}
.dc.today.achieved1.dot::after,.dc.today.achieved2.dot::after{background:#fff;}
.wsum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px;}
.sc{background:var(--mint);border-radius:12px;padding:10px 8px;text-align:center;}
.sc .v{font-size:20px;font-weight:600;color:var(--g600);}
.sc .l{font-size:10px;color:var(--txt2);margin-top:2px;}
/* modal */
.mbk{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.mdl{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 16px 0;max-height:90vh;overflow:auto;padding-bottom:max(24px,env(safe-area-inset-bottom));}
.mdl-h{font-size:17px;font-weight:600;color:var(--txt);margin-bottom:2px;}
.mdl-s{font-size:13px;color:var(--txt2);margin-bottom:16px;}
.sec-lbl{font-size:13px;font-weight:600;color:var(--g600);margin:16px 0 10px;padding-left:9px;border-left:3px solid var(--g400);}
.sec-lbl.sp{color:var(--sp600);border-left-color:var(--sp400);}
.ex-blk{margin-bottom:20px;}
.ex-blk .en{font-size:17px;font-weight:500;color:var(--txt);margin-bottom:10px;line-height:1.3;}
.ex-blk .en .unit{font-size:13px;color:var(--txt2);font-weight:400;margin-left:5px;}
.ctrl-row{display:flex;align-items:center;gap:12px;}
.cnt-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--bd);background:var(--bg2);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;color:var(--g600);flex-shrink:0;user-select:none;}
.cnt-btn:active{background:var(--g50);}
.cnt-btn.sp-btn{color:var(--sp600);border-color:var(--sp400);}
.cnt-btn.sp-btn:active{background:var(--sp50);}
.cnt-inp{width:76px;height:44px;text-align:center;font-size:20px;font-weight:600;color:var(--txt);border:1.5px solid var(--bd);border-radius:10px;background:var(--bg);padding:0;}
.cnt-inp:focus{outline:none;border-color:var(--g400);border-width:2px;}
.cnt-inp.sp-inp:focus{border-color:var(--sp400);}
.cnt-btn-sm{height:30px;padding:0 10px;border-radius:8px;border:1.5px solid var(--bd);background:var(--bg2);cursor:pointer;font-size:13px;font-weight:600;color:var(--g600);user-select:none;white-space:nowrap;}
.cnt-btn-sm:active{background:var(--g50);}
.cnt-btn-sm.sp-sm{color:var(--sp600);border-color:var(--sp400);}
.cnt-btn-sm.sp-sm:active{background:var(--sp50);}
.plus-row{display:flex;gap:6px;margin-top:6px;}
.sp-note{background:var(--sp50);border:1px solid var(--sp400);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--sp600);line-height:1.7;}
.sp-note strong{font-size:13px;display:block;margin-bottom:4px;}
.auto-vals{background:var(--bg2);border-radius:8px;padding:7px 10px;margin-top:6px;font-size:12px;color:var(--txt2);}
.auto-vals span{color:var(--g600);font-weight:600;}
.mbtns{display:flex;gap:10px;margin-top:20px;margin-bottom:4px;}
.bsave{flex:1;background:var(--g400);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;}
.bsave:active{background:var(--g600);}
.bcanc{background:var(--bg2);color:var(--txt2);border:1px solid var(--bd);border-radius:12px;padding:14px 18px;font-size:15px;cursor:pointer;}
/* stats */
.pg{padding:12px;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.stabs{display:flex;gap:6px;margin-bottom:12px;}
.stab{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--bd);color:var(--txt2);background:var(--bg);}
.stab.active{background:var(--g400);color:#fff;border-color:var(--g400);}
.bigs{background:var(--mint);border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.bigs .bv{font-size:26px;font-weight:600;color:var(--g600);}
.bigs .bl{font-size:12px;color:var(--txt2);}
.gs{background:var(--bg2);border-radius:12px;padding:10px 14px;margin-bottom:10px;}
.gs.sp-gs{background:var(--sp50);}
.gshd{display:flex;justify-content:space-between;margin-bottom:8px;}
.gshd span:first-child{font-size:14px;font-weight:600;color:var(--g600);}
.gshd span:last-child{font-size:15px;font-weight:600;color:var(--g600);}
.gs.sp-gs .gshd span{color:var(--sp600);}
.esr{display:flex;justify-content:space-between;padding:4px 0;border-top:0.5px solid var(--bd);}
.esr span:first-child{font-size:13px;color:var(--txt2);}
.esr span:last-child{font-size:13px;font-weight:500;color:var(--txt);}
.rc{background:var(--mint);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.rc .rt{font-size:12px;color:var(--txt2);margin-bottom:4px;}
.rc .rv{font-size:20px;font-weight:600;color:var(--g600);}
.rc .rd{font-size:12px;color:var(--txt2);margin-top:3px;}
.prw{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--bd);}
.prw:last-child{border-bottom:none;}
.hrw{padding:9px 0;border-bottom:0.5px solid var(--bd);display:flex;justify-content:space-between;}
.hrw:last-child{border-bottom:none;}
.stsec{background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.stsec.sp-sec{background:var(--sp50);}
.sthd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sthd-ti{font-size:14px;font-weight:600;color:var(--g600);}
.stsec.sp-sec .sthd-ti{color:var(--sp600);}
.strow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--bd);}
.strow:last-of-type{border-bottom:none;}
.strow-nm{flex:1;font-size:14px;color:var(--txt);}
.strow-ed{flex:1;font-size:14px;border:1px solid var(--g400);border-radius:8px;padding:5px 8px;background:var(--bg);color:var(--txt);}
.strow-ed:focus{outline:none;}
.ib{background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;font-size:16px;line-height:1;color:var(--txt2);}
.ib:active{background:rgba(0,0,0,0.07);}
.del-confirm{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;}
.del-confirm span{font-size:12px;color:var(--red);flex:1;}
.del-yes{background:var(--red);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;white-space:nowrap;}
.del-no{background:none;border:1px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer;color:var(--txt2);white-space:nowrap;}
.add-row{display:flex;gap:8px;margin-top:10px;}
.add-inp{flex:1;font-size:14px;border:1px solid var(--bd);border-radius:10px;padding:8px 10px;background:var(--bg);color:var(--txt);}
.add-inp:focus{outline:none;border-color:var(--g400);}
.add-btn{background:var(--g400);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:14px;cursor:pointer;white-space:nowrap;font-weight:500;}
.add-btn:active{background:var(--g600);}
.ged{font-size:14px;border:1px solid var(--g400);border-radius:8px;padding:5px 8px;background:var(--bg);color:var(--txt);min-width:0;flex:1;}
.ged:focus{outline:none;}
.slbl{font-size:12px;font-weight:600;color:var(--g600);margin:10px 0 4px;padding-left:8px;border-left:3px solid var(--g400);}
/* goal card on calendar */
.goal-bar{margin:0 10px 10px;display:flex;gap:8px;}
.goal-card{flex:1;border-radius:10px;padding:8px 10px;background:var(--bg2);border:1px solid var(--bd);}
.goal-card.hit{background:#FFFDE7;border-color:#F9A825;}
.goal-card .gc-lbl{font-size:10px;color:var(--txt2);margin-bottom:2px;}
.goal-card .gc-val{font-size:13px;font-weight:600;color:var(--txt);}
.goal-card.hit .gc-val{color:#E65100;}
/* goal settings */
.goal-sec{background:var(--mint);border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.goal-sec-title{font-size:14px;font-weight:600;color:var(--g600);margin-bottom:10px;}
.goal-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bd);}
.goal-row:last-child{border-bottom:none;}
.goal-row-lbl{font-size:14px;color:var(--txt);}
.goal-inp-wrap{display:flex;align-items:center;gap:6px;}
.goal-inp{width:68px;height:34px;text-align:center;font-size:15px;font-weight:600;color:var(--txt);border:1px solid var(--bd);border-radius:8px;background:var(--bg);padding:0;}
.goal-inp:focus{outline:none;border-color:var(--g400);}
.goal-unit{font-size:13px;color:var(--txt2);}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="mnav">
      <button class="nb" id="pm">‹</button>
      <span id="mlbl" style="font-size:15px;font-weight:600;min-width:100px;text-align:center;color:var(--txt)"></span>
      <button class="nb" id="nm">›</button>
    </div>
    <div style="font-size:12px;color:var(--txt2)" id="hsub"></div>
  </div>
  <div class="tabs" id="tabbar">
    <div class="tab active">カレンダー</div>
    <div class="tab">統計</div>
    <div class="tab">記録</div>
    <div class="tab">種目設定</div>
    <div class="tab">目標設定</div>
  </div>
  <div class="content">
    <div id="tab-calendar">
      <div class="cgrid">
        <div class="dlabels"><div class="dl">日</div><div class="dl">月</div><div class="dl">火</div><div class="dl">水</div><div class="dl">木</div><div class="dl">金</div><div class="dl">土</div></div>
        <div class="cdays" id="cdays"></div>
      </div>
      <div class="wsum">
        <div class="sc"><div class="v" id="sw">0</div><div class="l">今週合計</div></div>
        <div class="sc"><div class="v" id="sm">0</div><div class="l">今月合計</div></div>
        <div class="sc"><div class="v" id="sy">0</div><div class="l">年間合計</div></div>
      </div>
      <div class="goal-bar" id="goal-bar"></div>
    </div>
    <div id="tab-stats" style="display:none"><div class="pg">
      <div class="stabs" id="stabs">
        <div class="stab active" data-p="week">今週</div><div class="stab" data-p="month">今月</div>
        <div class="stab" data-p="year">年間</div><div class="stab" data-p="all">通算</div>
      </div>
      <div class="bigs">
        <div><div class="bl">期間合計</div><div class="bv" id="stotal">0回</div></div>
        <div style="text-align:right"><div class="bl">日数</div><div style="font-size:20px;font-weight:600;color:var(--g600)" id="sdays">0日</div></div>
      </div>
      <div id="slist"></div>
    </div></div>
    <div id="tab-records" style="display:none"><div class="pg">
      <div class="rc" id="rbest"></div>
      <div class="rc" id="rstreak"></div>
      <div style="font-size:14px;font-weight:600;color:var(--txt);margin:10px 0 6px">種目別 1日の最高</div>
      <div id="perex"></div>
      <div style="font-size:14px;font-weight:600;color:var(--txt);margin:12px 0 6px">直近の記録</div>
      <div id="hist"></div>
    </div></div>
    <div id="tab-settings" style="display:none"><div class="pg" id="sbody"></div></div>
    <div id="tab-goal" style="display:none"><div class="pg" id="gbody"></div></div>
  </div>
</div>
<div class="mbk" id="modal" style="display:none">
  <div class="mdl">
    <div class="mdl-h" id="mdlh"></div>
    <div class="mdl-s">回数を入力してください</div>
    <div id="mdlb"></div>
    <div class="mbtns">
      <button class="bcanc" id="mcanc">キャンセル</button>
      <button class="bsave" id="msave">保存</button>
    </div>
  </div>
</div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

const SK='wk7';
const SP_ID='sp_masato';
const SP_MAP={'e4':8,'e5':8,'e6':2,'e7':2,'e8':8};

const DEF=[
  {id:'g1',label:'懸垂系',items:[
    {id:'e1',name:'チンアップ'},
    {id:'e2',name:'プルアップ'},
    {id:'e3',name:'ワイドグリップチンニング'}
  ]},
  {id:'g2',label:'腹筋系',items:[
    {id:'e4',name:'レッグレイズ'},
    {id:'e5',name:'レッグレイズツイスト'},
    {id:'e6',name:'Lシット',unit:'10秒間'},
    {id:'e7',name:'バイシクルクランチ',unit:'10秒間'},
    {id:'e8',name:'ハンギングトートゥーバー'}
  ]},
  {id:'g3',label:'SP特訓',isSP:true,items:[
    {id:SP_ID,name:'無重力のMASATO腹筋SP'}
  ]}
];

function ld(){
  try{
    const s=JSON.parse(localStorage.getItem(SK)||'null');
    if(s&&s.groups)return s;
    for(const k of['wk6','wk5','workout_v4','workout_v3','workout_v2']){
      const o=JSON.parse(localStorage.getItem(k)||'null');
      if(!o)continue;
      let g=o.groups;
      if(!g&&o.exercises)g=Object.entries(o.exercises).map(([k,v])=>({id:'g_'+k,label:v.label||k,items:v.items||[]}));
      if(g)return{groups:g,data:o.data||{}};
    }
  }catch(e){}
  return{groups:JSON.parse(JSON.stringify(DEF)),data:{}};
}
function sv(){try{localStorage.setItem(SK,JSON.stringify({groups,data,goals}));}catch(e){}}

let{groups,data,goals:_goals}=ld();
// goals: {gid: number}  — per-group daily target
let goals=_goals||{};

// Ensure SP group exists
if(!groups.find(g=>g.isSP))groups.push(JSON.parse(JSON.stringify(DEF[2])));
const spg=groups.find(g=>g.isSP);
if(spg&&!spg.items.find(e=>e.id===SP_ID))spg.items.push({id:SP_ID,name:'無重力のMASATO腹筋SP'});
// Ensure units
const g2=groups.find(g=>g.id==='g2');
if(g2){
  const ls=g2.items.find(e=>e.id==='e6');if(ls&&!ls.unit)ls.unit='10秒間';
  const bc=g2.items.find(e=>e.id==='e7');if(bc&&!bc.unit)bc.unit='10秒間';
  // merge old hangingtoe+toebar
  const ht=g2.items.find(e=>e.id==='hangingtoe');
  const tb=g2.items.find(e=>e.id==='toebar');
  if(ht&&tb){ht.id='e8';ht.name='ハンギングトートゥーバー';g2.items=g2.items.filter(e=>e.id!=='toebar');}
}
sv();

let now=new Date(),vy=now.getFullYear(),vm=now.getMonth(),statP='week',mDate=null;
const MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
let edSet=new Set(),pdSet=new Set(),mCounts={};

function allEx(){return groups.flatMap(g=>g.items);}
function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function dtot(key){const r=data[key];if(!r)return 0;return allEx().reduce((s,e)=>s+(r[e.id]||0),0);}
function uid(){return'u'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function btn(text,cls,fn){const b=el('button',cls);b.textContent=text;b.onclick=fn;return b;}

function applySP(spVal){
  for(const[eid,mult]of Object.entries(SP_MAP)){
    mCounts[eid]=(mCounts['_b'+eid]||0)+spVal*mult;
  }
}

/* CALENDAR */
document.getElementById('pm').onclick=()=>{vm--;if(vm<0){vm=11;vy--;}renderCal();};
document.getElementById('nm').onclick=()=>{vm++;if(vm>11){vm=0;vy++;}renderCal();};

// Returns 0=未達成, 1=1系統達成, 2=全系統達成
function achievedLevel(key){
  const r=data[key];if(!r)return 0;
  const activeGoals=groups.filter(g=>!g.isSP&&(goals[g.id]||0)>0);
  if(!activeGoals.length)return 0;
  const hitCount=activeGoals.filter(g=>{
    const sum=g.items.reduce((s,e)=>s+(r[e.id]||0),0);
    return sum>=(goals[g.id]||0);
  }).length;
  if(hitCount===0)return 0;
  if(hitCount>=activeGoals.length)return 2;
  return 1;
}

// Group totals for a given day key
function groupTots(key){
  const r=data[key]||{};
  const res={};
  groups.forEach(g=>{res[g.id]=g.items.reduce((s,e)=>s+(r[e.id]||0),0);});
  return res;
}

function renderCal(){
  document.getElementById('mlbl').textContent=`${vy}年 ${MN[vm]}`;
  const first=new Date(vy,vm,1).getDay(),last=new Date(vy,vm+1,0).getDate();
  const tk=dk(now.getFullYear(),now.getMonth(),now.getDate());
  const c=document.getElementById('cdays');c.innerHTML='';
  for(let i=0;i<first;i++){const p=new Date(vy,vm,0-first+i+1);const d=el('div','dc other');d.textContent=p.getDate();c.appendChild(d);}
  for(let d=1;d<=last;d++){
    const key=dk(vy,vm,d);
    const lv=achievedLevel(key);
    const achCls=lv===2?' achieved2':lv===1?' achieved1':'';
    const cls='dc'+(key===tk?' today':'')+(dtot(key)>0?' dot':'')+achCls;
    const div=el('div',cls);
    div.textContent=d;const _d=d;div.onclick=()=>openModal(vy,vm,_d);c.appendChild(div);
  }
  updateSum();
  renderGoalBar();
}

function renderGoalBar(){
  const bar=document.getElementById('goal-bar');bar.innerHTML='';
  const tk=dk(now.getFullYear(),now.getMonth(),now.getDate());
  const gt=groupTots(tk);
  const targetGroups=groups.filter(g=>!g.isSP&&(goals[g.id]||0)>0);
  if(!targetGroups.length)return;
  targetGroups.forEach(g=>{
    const target=goals[g.id]||0;
    const actual=gt[g.id]||0;
    const hit=actual>=target;
    const card=el('div','goal-card'+(hit?' hit':''));
    const lbl=el('div','gc-lbl');lbl.textContent=g.label+'（今日）';
    const val=el('div','gc-val');
    val.textContent=(hit?'💮 ':'')+actual+' / '+target+'回';
    card.appendChild(lbl);card.appendChild(val);bar.appendChild(card);
  });
}
function updateSum(){
  const y=now.getFullYear(),m=now.getMonth();
  const sow=new Date(now);sow.setDate(now.getDate()-now.getDay());
  let wk=0,mo=0,yr=0,all=0;
  for(const k of Object.keys(data)){const t=dtot(k),kd=new Date(k);if(kd.getFullYear()===y&&kd.getMonth()===m)mo+=t;if(kd.getFullYear()===y)yr+=t;if(kd>=sow)wk+=t;all+=t;}
  document.getElementById('sw').textContent=wk;document.getElementById('sm').textContent=mo;
  document.getElementById('sy').textContent=yr;document.getElementById('hsub').textContent=`通算 ${all}回`;
}

/* MODAL */
function openModal(y,m,d){
  mDate=dk(y,m,d);const ex=data[mDate]||{};
  mCounts={};
  const spVal=ex[SP_ID]||0;
  allEx().forEach(e=>{
    if(SP_MAP[e.id]){
      mCounts['_b'+e.id]=Math.max(0,(ex[e.id]||0)-spVal*SP_MAP[e.id]);
      mCounts[e.id]=ex[e.id]||0;
    }else{mCounts[e.id]=ex[e.id]||0;}
  });
  mCounts[SP_ID]=spVal;
  document.getElementById('mdlh').textContent=`${y}年${MN[m]}${d}日`;
  buildModal();
  document.getElementById('modal').style.display='flex';
}

function buildModal(){
  const body=document.getElementById('mdlb');body.innerHTML='';
  groups.forEach(g=>{
    const lbl=el('div','sec-lbl'+(g.isSP?' sp':''));
    lbl.textContent=`${g.label}（${g.items.length}種目）`;body.appendChild(lbl);
    if(g.isSP){
      const note=el('div','sp-note');
      note.innerHTML='<strong>SP自動加算について</strong>1回増やすごとに腹筋系へ自動加算：<br>レッグレイズ+8、レッグレイズツイスト+8、Lシット+2、バイシクルクランチ+2、ハンギングトートゥーバー+8';
      body.appendChild(note);
    }
    g.items.forEach(e=>{
      const isSP=e.id===SP_ID,isMapped=!!SP_MAP[e.id];
      const blk=el('div','ex-blk');
      const nm=el('div','en');
      nm.appendChild(document.createTextNode(e.name));
      if(e.unit){const u=el('span','unit');u.textContent=e.unit;nm.appendChild(u);}
      blk.appendChild(nm);
      const ctrl=el('div','ctrl-row');
      const bc=isSP?'cnt-btn sp-btn':'cnt-btn';
      const ic=isSP?'cnt-inp sp-inp':'cnt-inp';
      const bm=el('button',bc);bm.textContent='−';
      const inp=el('input',ic);inp.type='number';inp.min='0';inp.inputMode='numeric';
      inp.value=mCounts[e.id]||0;inp.dataset.id=e.id;
      const bp=el('button',bc);bp.textContent='＋';
      // helper: add delta to an exercise count
      function addDelta(delta){
        if(isSP){
          mCounts[SP_ID]=Math.max(0,(mCounts[SP_ID]||0)+delta);
          applySP(mCounts[SP_ID]);refreshModal();
        } else if(isMapped){
          mCounts['_b'+e.id]=Math.max(0,(mCounts['_b'+e.id]||0)+delta);
          mCounts[e.id]=mCounts['_b'+e.id]+(mCounts[SP_ID]||0)*SP_MAP[e.id];
          inp.value=mCounts[e.id];updateAutoVal(e.id);
        } else {
          mCounts[e.id]=Math.max(0,(mCounts[e.id]||0)+delta);
          inp.value=mCounts[e.id];
        }
      }
      bm.onclick=()=>addDelta(-1);
      bp.onclick=()=>addDelta(1);
      inp.oninput=()=>{
        const v=Math.max(0,parseInt(inp.value)||0);
        if(isSP){mCounts[SP_ID]=v;applySP(v);refreshModal();}
        else if(isMapped){mCounts[e.id]=v;mCounts['_b'+e.id]=Math.max(0,v-(mCounts[SP_ID]||0)*SP_MAP[e.id]);updateAutoVal(e.id);}
        else{mCounts[e.id]=v;}
      };
      ctrl.appendChild(bm);ctrl.appendChild(inp);ctrl.appendChild(bp);blk.appendChild(ctrl);
      // +5 / +10 row
      const pr=el('div','plus-row');
      const smc=isSP?'cnt-btn-sm sp-sm':'cnt-btn-sm';
      [5,10].forEach(n=>{
        const b=el('button',smc);b.textContent='+'+n;
        b.onclick=()=>addDelta(n);
        pr.appendChild(b);
      });
      blk.appendChild(pr);
      if(isMapped){
        const av=el('div','auto-vals');av.id='av-'+e.id;
        const spV=mCounts[SP_ID]||0,bV=mCounts['_b'+e.id]||0;
        if(spV>0)av.innerHTML=`自己入力 <span>${bV}</span> + SP加算 <span>${spV*SP_MAP[e.id]}</span> = <span>${mCounts[e.id]}</span>`;
        blk.appendChild(av);
      }
      body.appendChild(blk);
    });
  });
}

function refreshModal(){
  document.querySelectorAll('#mdlb input[data-id]').forEach(inp=>{
    inp.value=mCounts[inp.dataset.id]||0;
  });
  for(const eid of Object.keys(SP_MAP))updateAutoVal(eid);
}
function updateAutoVal(eid){
  const av=document.getElementById('av-'+eid);if(!av)return;
  const spV=mCounts[SP_ID]||0,bV=mCounts['_b'+eid]||0;
  if(spV>0)av.innerHTML=`自己入力 <span>${bV}</span> + SP加算 <span>${spV*SP_MAP[eid]}</span> = <span>${mCounts[eid]}</span>`;
  else av.innerHTML='';
}

/* RECORDS */
// 各種目・各系統の「今日から遡って何日連続で記録があるか」を計算
function calcStreak(filterFn){
  // filterFn(key) → true なら「その日は達成」とみなす
  const todayKey=dk(now.getFullYear(),now.getMonth(),now.getDate());
  let streak=0;
  let cursor=new Date(now);
  while(true){
    const key=dk(cursor.getFullYear(),cursor.getMonth(),cursor.getDate());
    if(!filterFn(key))break;
    streak++;
    cursor.setDate(cursor.getDate()-1);
    if(streak>3650)break; // 安全上限
  }
  return streak;
}
function streakLabel(n){
  if(n<=0)return '';
  if(n>=365){const y=Math.floor(n/365);return y+'年連続達成中！';}
  if(n>=30){const m=Math.floor(n/30);return m+'か月連続達成中！';}
  if(n>=7){const w=Math.floor(n/7);return w+'週間連続達成中！';}
  return n+'日連続達成中！';
}

function renderRec(){
  const keys=Object.keys(data).sort();
  if(!keys.length){
    document.getElementById('rbest').innerHTML='<div class="rt">1日の最高回数</div><div class="rv">記録なし</div>';
    document.getElementById('rstreak').innerHTML='<div class="rt">最長連続日数</div><div class="rv">記録なし</div>';
    document.getElementById('perex').innerHTML='';document.getElementById('hist').innerHTML='';return;
  }
  // 全体ベスト
  let bd='',bv=0;keys.forEach(k=>{const t=dtot(k);if(t>bv){bv=t;bd=k;}});
  document.getElementById('rbest').innerHTML=`<div class="rt">1日の最高（全種目合計）</div><div class="rv">${bv}回</div><div class="rd">${bd}</div>`;
  // 最長連続
  let ms=0,cur=0,prev=null;
  keys.forEach(k=>{if(prev){const df=(new Date(k)-new Date(prev))/86400000;cur=df===1?cur+1:1;}else cur=1;if(cur>ms)ms=cur;prev=k;});
  document.getElementById('rstreak').innerHTML=`<div class="rt">最長連続トレーニング日数</div><div class="rv">${ms}日</div>`;

  // 種目別ベスト
  const exB={};allEx().forEach(e=>exB[e.id]={val:0,day:''});
  keys.forEach(k=>{const r=data[k]||{};allEx().forEach(e=>{const v=r[e.id]||0;if(v>exB[e.id].val)exB[e.id]={val:v,day:k};});});

  const per=document.getElementById('perex');per.innerHTML='';

  groups.forEach(g=>{
    // 系統ヘッダー：系統名 + 系統の1日最高回数
    const groupBest=keys.reduce((mx,k)=>{
      const r=data[k]||{};
      const s=g.items.reduce((ss,e)=>ss+(r[e.id]||0),0);
      return s>mx?s:mx;
    },0);

    // 系統の連続達成（その日の系統合計が1以上）
    const gStreak=calcStreak(key=>{
      const r=data[key];if(!r)return false;
      return g.items.some(e=>(r[e.id]||0)>0);
    });
    const gStreakLbl=streakLabel(gStreak);

    // 系統ヘッダー行
    const hdr=el('div');
    hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin:12px 0 4px;padding-left:8px;border-left:3px solid var(--g400)';
    const hl=el('div');
    const htitle=el('div');
    htitle.style.cssText='font-size:13px;font-weight:600;color:var(--g600)';
    htitle.textContent=g.label;
    hl.appendChild(htitle);
    if(gStreakLbl){
      const hs=el('div');
      hs.style.cssText='font-size:11px;color:var(--sp600);font-weight:500;margin-top:1px';
      hs.textContent='🔥 '+gStreakLbl;
      hl.appendChild(hs);
    }
    const hv=el('div');
    hv.style.cssText='text-align:right';
    const hvlbl=el('div');hvlbl.style.cssText='font-size:10px;color:var(--txt2)';hvlbl.textContent='1日最高';
    const hvval=el('div');hvval.style.cssText='font-size:16px;font-weight:600;color:var(--g600)';
    hvval.textContent=groupBest>0?groupBest+'回':'—';
    hv.appendChild(hvlbl);hv.appendChild(hvval);
    hdr.appendChild(hl);hdr.appendChild(hv);
    per.appendChild(hdr);

    // 種目別行
    g.items.forEach(e=>{
      const b=exB[e.id];
      // 種目連続達成（その日その種目が1以上）
      const eStreak=calcStreak(key=>{
        const r=data[key];if(!r)return false;
        return(r[e.id]||0)>0;
      });
      const eStreakLbl=streakLabel(eStreak);

      const row=el('div','prw');
      const lft=el('div');lft.style.cssText='flex:1;min-width:0';
      const nm=el('div');nm.style.cssText='font-size:14px;color:var(--txt)';
      nm.textContent=e.name+(e.unit?`（${e.unit}）`:'');
      lft.appendChild(nm);
      if(eStreakLbl){
        const sl=el('div');
        sl.style.cssText='font-size:11px;color:var(--sp600);font-weight:500;margin-top:2px';
        sl.textContent='🔥 '+eStreakLbl;
        lft.appendChild(sl);
      }
      const right=el('div');right.style.cssText='text-align:right;flex-shrink:0;padding-left:8px';
      const vEl=el('div');vEl.style.cssText='font-size:16px;font-weight:600;color:var(--g600)';
      vEl.textContent=b.val>0?b.val+'回':'—';
      const dEl=el('div');dEl.style.cssText='font-size:11px;color:var(--txt2)';
      dEl.textContent=b.val>0?b.day:'';
      right.appendChild(vEl);right.appendChild(dEl);
      row.appendChild(lft);row.appendChild(right);
      per.appendChild(row);
    });
  });

  document.getElementById('hist').innerHTML=keys.slice(-12).reverse().map(k=>`<div class="hrw"><span style="font-size:14px;color:var(--txt)">${k}</span><span style="font-size:14px;font-weight:600;color:var(--g600)">${dtot(k)}回</span></div>`).join('');
}
